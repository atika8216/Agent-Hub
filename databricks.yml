# Bundle config for Agent Hub. Replace every `<your-...>` placeholder with values
# from your own Databricks workspace before deploying. See README "Deploy" section
# or run the `installation-helper` skill in your AI IDE to get walked through it.
#
# Runtime env vars (LAKEBASE_*, LOG_LEVEL, BOOTSTRAP_ADMIN_EMAILS,
# AGENT_HUB_ADMIN_WAREHOUSE_ID) live in `app.yaml` -- the bundle CLI does NOT
# support per-app env in this schema (any `config` block emits "unknown field"
# and is silently dropped).

bundle:
  name: agent-hub

sync:
  exclude:
    - node_modules
    - .venv
    - .apx
    - .vscode
    - docs
    # The frontend is pre-built locally (`npm run build` -> __dist__/).
    # Keeping package.json in the upload triggers the Databricks Apps
    # runtime to auto-run `npm install` from its npm proxy during
    # deploy, which has produced persistent ETIMEDOUT failures (e.g. on
    # zrender 6.0.0). Excluding the Node manifests removes that step
    # entirely -- the shipped __dist__ bundle is all the runtime needs.
    - package.json
    - package-lock.json
    - bun.lock
    - "**/__pycache__"
    - "*.log"
    - ".env"
    - ".env.example"

variables:
  workspace_host:
    description: Workspace URL
    default: https://<your-workspace>.cloud.databricks.com
  app_name:
    description: Application display name
    default: agent-hub

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://<your-workspace>.cloud.databricks.com
      profile: <your-profile>
    variables:
      app_name: agent-hub-dev

  prod:
    mode: production
    workspace:
      host: https://<your-workspace>.cloud.databricks.com
      profile: <your-profile>
    variables:
      app_name: agent-hub

resources:
  apps:
    agent_hub:
      name: ${var.app_name}
      description: "Agent Chat Hub - Multi-agent catalog with chat and memory"
      source_code_path: ${workspace.file_path}
      # Granted user OAuth scopes for OBO. Keep aligned with
      # app.yaml -> user_authorization.scopes.
      # NOTE: Two scopes are intentionally omitted because the bundle CLI
      # rejects them as "not a valid scope" (F1/F2 in docs/obo-auth-design.md):
      #   - model-serving
      #   - iam.access-control:workspace   (rejected as of 2026-04-17 dev deploy)
      # `app.yaml` still lists them so they are re-added automatically once
      # the platform accepts them. `scripts/check_scopes.py` treats both as
      # accepted drift and prints the F5 reminder when the bundle-scope set
      # actually changes.
      user_api_scopes:
        - serving.serving-endpoints
        - sql
        - dashboards.genie
      permissions:
        - user_name: ${workspace.current_user.userName}
          level: CAN_MANAGE
