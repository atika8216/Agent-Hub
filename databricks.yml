bundle:
  name: scgp-agent-hub

sync:
  exclude:
    - node_modules
    - .venv
    - .apx
    - .vscode
    - docs
    # The frontend is pre-built locally (`npm run build` -> __dist__/).
    # Keeping package.json in the upload triggers the Databricks Apps
    # runtime to auto-run `npm install` from its npm proxy during
    # deploy, which has produced persistent ETIMEDOUT failures (e.g. on
    # zrender 6.0.0). Excluding the Node manifests removes that step
    # entirely -- the shipped __dist__ bundle is all the runtime needs.
    - package.json
    - package-lock.json
    - bun.lock
    - "**/__pycache__"
    - "*.log"
    - ".env"
    - ".env.example"

variables:
  # SQL warehouse used by the app SP for UC tag discovery
  # (system.information_schema.function_tags / connection_tags). Same workspace
  # for dev+prod in this bundle; override per target if workspaces diverge.
  scgp_admin_warehouse_id:
    description: >-
      Warehouse ID for SCGP_ADMIN_WAREHOUSE_ID (UC MCP/HTTP catalog discovery).
    default: 7b7cd1e7e17a3862
  workspace_host:
    description: Workspace URL
    default: https://fevm-aan-demo-workspace.cloud.databricks.com
  app_name:
    description: Application display name
    default: scgp-agent-hub
  lakebase_project_id:
    description: Lakebase project ID
    default: scgp-agent-hub
  lakebase_branch_id:
    description: Lakebase branch ID
    default: production

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-aan-demo-workspace.cloud.databricks.com
      profile: fevm-aan-demo
    variables:
      app_name: scgp-agent-hub-dev
      lakebase_branch_id: development

  prod:
    mode: production
    workspace:
      host: https://fevm-aan-demo-workspace.cloud.databricks.com
      profile: fevm-aan-demo
    variables:
      app_name: scgp-agent-hub
      lakebase_branch_id: production

resources:
  apps:
    scgp_agent_hub:
      name: ${var.app_name}
      description: "SCGP Agent Chat Hub - Multi-agent catalog with chat and memory"
      source_code_path: ${workspace.file_path}
      config:
        env:
          - name: SCGP_ADMIN_WAREHOUSE_ID
            value: ${var.scgp_admin_warehouse_id}
      # Granted user OAuth scopes for OBO. Keep aligned with
      # app.yaml -> user_authorization.scopes.
      # NOTE: Two scopes are intentionally omitted because the bundle CLI
      # rejects them as "not a valid scope" (F1/F2 in docs/obo-auth-design.md):
      #   - model-serving
      #   - iam.access-control:workspace   (rejected as of 2026-04-17 dev deploy)
      # `app.yaml` still lists them so they are re-added automatically once
      # the platform accepts them. `scripts/check_scopes.py` treats both as
      # accepted drift and prints the F5 reminder when the bundle-scope set
      # actually changes.
      user_api_scopes:
        - serving.serving-endpoints
        - sql
        - dashboards.genie
      permissions:
        - user_name: ${workspace.current_user.userName}
          level: CAN_MANAGE
