command:
  - uvicorn
  - agent_hub.backend.app:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"
  - --workers
  - "2"

# Runtime env vars. The Databricks Apps runtime reads this `env:` block at
# startup; it is the SINGLE SOURCE OF TRUTH for app env. The bundle CLI does
# NOT support setting env vars on apps via databricks.yml (the `config` field
# is silently dropped at validate time -- see "unknown field: config" warning),
# so do NOT duplicate values into databricks.yml.
#
# IMPORTANT: keep the env list free of leading comments BETWEEN `env:` and the
# first `- name:` entry. The Apps runtime YAML parser silently drops the
# entire block if comments precede the first list item.
#
# Phase rollback levers (default-off, docs/rollback-obo-gaps-2026-04-17.md):
#   AGENT_HUB_DISABLE_UC_MCP_DISCOVERY=1   Phase 1 (disable UC-tag discovery)
#   AGENT_HUB_DISABLE_UC_MCP_CHAT=1        Phase 2 (revert HTTP/MCP chat to stub)
#   AGENT_HUB_LEGACY_UI=1                  Phase 3 (lock UI to legacy dark palette)
# Set those via the Databricks App UI -> Environment if you need to toggle them.
#
# For local dev (`uvicorn agent_hub.backend.app:app` directly), copy
# .env.example to .env -- pydantic-settings loads it automatically.
env:
  - name: "LAKEBASE_PROJECT_ID"
    value: "<your-lakebase-project>"
  - name: "LAKEBASE_BRANCH_ID"
    value: "production"
  - name: "LOG_LEVEL"
    value: "INFO"
  - name: "BOOTSTRAP_ADMIN_EMAILS"
    value: "<your.email>@<your-domain>"
  - name: "AGENT_HUB_ADMIN_WAREHOUSE_ID"
    value: "<your-warehouse-id>"

user_authorization:
  scopes:
    - serving.serving-endpoints
    - model-serving
    - iam.access-control:workspace
    # ``access-management`` is the scope the Agent Bricks permissions API
    # (``/api/2.0/permissions/knowledge-assistants/{tile_id}``) actually
    # demands for GET/PATCH. Discovered on 2026-04-27 while verifying the
    # admin Grant catalog access button -- OBO returned:
    #   "Provided OAuth token does not have required scopes: access-management".
    # Declared here so the platform accepts it if/when it recognises the
    # token; the admin button silently no-ops on unauthorized today.
    - access-management
    - sql
    - dashboards.genie
    # Note: Agent Bricks APIs (/api/2.0/tiles and
    # /api/2.0/multi-agent-supervisors/{tile_id}) require the
    # "all-apis" OAuth scope, which Databricks Apps does not expose
    # in user_authorization.scopes (silently filtered). The backend
    # in catalog_service.py falls back to the service principal for
    # these reads; if the SP does not own the agent, the MAS detail
    # refresh will fail and the row stays on its cached display name.
    # See docs/rollback-obo-gaps-2026-04-17.md §Deploy I.

health:
  path: /api/v1/health/live
  interval_seconds: 30
  timeout_seconds: 5
  failure_threshold: 3

readiness:
  path: /api/v1/health/ready
  interval_seconds: 10
  timeout_seconds: 5
  failure_threshold: 3
